<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ISC2 CC — HARD MODE | 100 Brutal Questions</title>
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --card: #161b24;
    --border: #1e2532;
    --accent: #00d4ff;
    --accent2: #ff3e6c;
    --accent3: #39ff14;
    --gold: #ffd700;
    --text: #c9d1d9;
    --muted: #586069;
    --correct: #1a3a1a;
    --correct-border: #39ff14;
    --wrong: #3a1a1a;
    --wrong-border: #ff3e6c;
    --font: 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0a0c10 0%, #0d1117 50%, #0a0c10 100%);
    border-bottom: 1px solid var(--border);
    padding: 2rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 80px,
      rgba(0,212,255,0.03) 80px,
      rgba(0,212,255,0.03) 81px
    );
  }
  .skull { font-size: 2.5rem; display: block; margin-bottom: .5rem; }
  header h1 {
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--accent2);
    letter-spacing: .1em;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(255,62,108,.5);
  }
  header p {
    color: var(--muted);
    font-size: .8rem;
    margin-top: .4rem;
    letter-spacing: .05em;
  }
  .domain-badge {
    display: inline-block;
    background: rgba(0,212,255,.08);
    border: 1px solid rgba(0,212,255,.25);
    color: var(--accent);
    font-size: .7rem;
    padding: .2rem .7rem;
    border-radius: 2px;
    margin: .2rem;
    letter-spacing: .06em;
  }

  /* ── SCOREBOARD ── */
  #scoreboard {
    display: flex;
    justify-content: center;
    gap: 2rem;
    flex-wrap: wrap;
    padding: 1rem 1.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .stat { text-align: center; }
  .stat-val { font-size: 1.5rem; font-weight: 700; }
  .stat-label { font-size: .65rem; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
  #score-display { color: var(--accent3); }
  #wrong-display { color: var(--accent2); }
  #remain-display { color: var(--accent); }
  #pct-display { color: var(--gold); }

  /* ── FILTER BAR ── */
  #filter-bar {
    display: flex; flex-wrap: wrap; gap: .5rem;
    padding: .8rem 1.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  #filter-bar span { font-size: .7rem; color: var(--muted); margin-right: .3rem; }
  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font);
    font-size: .7rem;
    padding: .3rem .7rem;
    cursor: pointer;
    border-radius: 2px;
    transition: all .2s;
    letter-spacing: .04em;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,.06);
  }
  #reset-btn {
    margin-left: auto;
    background: rgba(255,62,108,.08);
    border: 1px solid rgba(255,62,108,.3);
    color: var(--accent2);
    font-family: var(--font);
    font-size: .7rem;
    padding: .3rem .9rem;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: .04em;
    transition: all .2s;
  }
  #reset-btn:hover { background: rgba(255,62,108,.2); }

  /* ── QUESTIONS ── */
  #questions-container { padding: 1.5rem; max-width: 900px; margin: 0 auto; }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 1.2rem;
    overflow: hidden;
    transition: border-color .2s;
  }
  .question-card.answered { border-color: #2a3040; }

  .q-header {
    display: flex; align-items: flex-start; gap: .8rem;
    padding: 1rem 1.2rem .8rem;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,.01);
  }
  .q-num {
    font-size: .7rem;
    color: var(--accent2);
    font-weight: 700;
    min-width: 2.4rem;
    padding-top: .1rem;
    letter-spacing: .05em;
  }
  .q-domain {
    font-size: .6rem;
    color: var(--muted);
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    padding: .15rem .5rem;
    border-radius: 2px;
    white-space: nowrap;
    margin-top: .1rem;
    letter-spacing: .04em;
  }
  .q-text { font-size: .88rem; line-height: 1.55; color: var(--text); }
  .q-scenario {
    background: rgba(0,212,255,.04);
    border-left: 2px solid var(--accent);
    padding: .6rem .8rem;
    margin-bottom: .7rem;
    font-size: .82rem;
    color: #8bb3d0;
    font-style: italic;
    line-height: 1.5;
  }

  .options { padding: .7rem 1.2rem 1rem; }
  .option {
    display: flex; align-items: flex-start; gap: .7rem;
    padding: .6rem .8rem;
    margin-bottom: .4rem;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    transition: all .15s;
    background: transparent;
  }
  .option:hover:not(.locked) { border-color: var(--accent); background: rgba(0,212,255,.04); }
  .option.correct { background: var(--correct); border-color: var(--correct-border); }
  .option.wrong { background: var(--wrong); border-color: var(--wrong-border); }
  .option.locked { cursor: default; }
  .opt-letter {
    font-size: .7rem;
    font-weight: 700;
    color: var(--muted);
    min-width: 1.1rem;
    padding-top: .1rem;
  }
  .option.correct .opt-letter { color: var(--correct-border); }
  .option.wrong .opt-letter { color: var(--accent2); }
  .opt-text { font-size: .83rem; line-height: 1.45; }

  .explanation {
    display: none;
    background: rgba(0,212,255,.04);
    border-top: 1px solid var(--border);
    padding: .8rem 1.2rem;
    font-size: .8rem;
    line-height: 1.55;
    color: #9bbfd0;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--accent3); }

  /* ── RESULTS MODAL ── */
  #results-modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #results-modal.show { display: flex; }
  .modal-box {
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 2.5rem;
    max-width: 480px;
    width: 90%;
    text-align: center;
    box-shadow: 0 0 60px rgba(0,212,255,.15);
  }
  .modal-box h2 { color: var(--accent); font-size: 1.3rem; margin-bottom: .5rem; letter-spacing: .06em; }
  .modal-score { font-size: 3rem; font-weight: 700; margin: 1rem 0 .3rem; }
  .modal-grade { font-size: .9rem; color: var(--muted); margin-bottom: 1.2rem; }
  .modal-close {
    background: rgba(0,212,255,.1);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font);
    padding: .6rem 1.5rem;
    cursor: pointer;
    font-size: .8rem;
    border-radius: 3px;
    transition: all .2s;
  }
  .modal-close:hover { background: rgba(0,212,255,.25); }

  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    margin: 1rem 0;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    transition: width .3s;
  }

  @media(max-width:600px){
    header { padding: 1.5rem 1rem; }
    #scoreboard { gap: 1rem; }
    .stat-val { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<header>
  <span class="skull">💀</span>
  <h1>ISC2 CC — HARD MODE</h1>
  <p>100 Scenario-Based Questions · All 5 Domains · No Mercy</p>
  <div style="margin-top:.8rem">
    <span class="domain-badge">D1: Security Principles</span>
    <span class="domain-badge">D2: BC/DR/IR</span>
    <span class="domain-badge">D3: Access Control</span>
    <span class="domain-badge">D4: Network Security</span>
    <span class="domain-badge">D5: Security Operations</span>
  </div>
</header>

<div id="scoreboard">
  <div class="stat"><div class="stat-val" id="score-display">0</div><div class="stat-label">Correct</div></div>
  <div class="stat"><div class="stat-val" id="wrong-display">0</div><div class="stat-label">Wrong</div></div>
  <div class="stat"><div class="stat-val" id="remain-display">100</div><div class="stat-label">Remaining</div></div>
  <div class="stat"><div class="stat-val" id="pct-display">—</div><div class="stat-label">Score %</div></div>
</div>

<div id="filter-bar">
  <span>FILTER:</span>
  <button class="filter-btn active" onclick="filterDomain('all',this)">ALL</button>
  <button class="filter-btn" onclick="filterDomain('D1',this)">Domain 1</button>
  <button class="filter-btn" onclick="filterDomain('D2',this)">Domain 2</button>
  <button class="filter-btn" onclick="filterDomain('D3',this)">Domain 3</button>
  <button class="filter-btn" onclick="filterDomain('D4',this)">Domain 4</button>
  <button class="filter-btn" onclick="filterDomain('D5',this)">Domain 5</button>
  <button id="reset-btn" onclick="resetAll()">↺ RESET ALL</button>
</div>

<div id="questions-container"></div>

<div id="results-modal">
  <div class="modal-box">
    <h2>⚡ HARD MODE COMPLETE</h2>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="modal-bar"></div></div>
    <div class="modal-score" id="modal-score-text"></div>
    <div class="modal-grade" id="modal-grade-text"></div>
    <button class="modal-close" onclick="document.getElementById('results-modal').classList.remove('show')">REVIEW ANSWERS</button>
  </div>
</div>

<script>
const QUESTIONS = [
  // ───────────────────── DOMAIN 1: Security Principles ─────────────────────
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`A healthcare organization stores patient data encrypted with AES-256. An internal audit reveals the encryption key is stored in the same database as the ciphertext, protected only by file system permissions. Which principle is MOST directly violated?`,
    opts:["Availability — the data cannot be easily recovered","Confidentiality — the key proximity defeats encryption's purpose","Integrity — keys and data should be hash-verified together","Non-repudiation — audit trails are missing"],
    answer:1,
    exp:`Storing the key with the ciphertext is equivalent to leaving a safe's combination taped to the door. <strong>Confidentiality</strong> is directly undermined because any attacker who exfiltrates the database also gets the key. AES-256 is strong, but key management failures render it moot.`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`During a risk assessment, an analyst determines that a threat has a 30% annual likelihood of occurring and that a successful exploitation would result in $500,000 in losses. A proposed control costs $100,000 annually and would reduce likelihood to 5%. What is the annualized loss expectancy BEFORE the control, and does the control justify its cost?`,
    opts:["ALE = $150,000; control is not cost-justified","ALE = $150,000; control saves $125,000/yr so it IS justified","ALE = $500,000; control is cost-justified","ALE = $100,000; control is marginally justified"],
    answer:1,
    exp:`ALE = SLE × ARO = $500,000 × 0.30 = <strong>$150,000</strong>. With the control, ALE drops to $500,000 × 0.05 = $25,000. Annual savings = $150,000 − $25,000 = <strong>$125,000</strong>, which exceeds the $100,000 control cost by $25,000. The control is cost-justified.`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`A CISO receives a legal order requiring the organization to produce all emails from a specific executive over the past three years. The organization's email retention policy automatically purges emails after 18 months. No litigation hold was ever issued. Which governance failure is PRIMARILY responsible?`,
    opts:["Lack of a data classification policy","Absence of a legal hold / litigation hold process","Insufficient backup frequency","Non-compliance with the ISC2 Code of Ethics"],
    answer:1,
    exp:`A <strong>litigation hold</strong> (legal hold) suspends normal retention/deletion schedules when litigation is reasonably anticipated. Without this process, routine purging destroyed evidence subject to discovery — a serious legal and governance failure. Data classification and backup frequency are secondary issues.`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`An analyst classifies a risk as "accepted" after management reviews and decides no controls will be implemented. Six months later the threat materializes and causes significant damage. Under the ISC2 Code of Ethics, what was the security professional's CORRECT obligation after management's decision?`,
    opts:["Implement controls anyway to protect the organization","Escalate outside the organization to regulators immediately","Document the decision, communicate residual risk clearly, and respect management's authority","Resign to avoid being associated with the decision"],
    answer:2,
    exp:`The ISC2 Code of Ethics requires acting honorably and providing competent service. Security professionals must <strong>clearly communicate residual risk</strong> and document acceptance decisions — but they must also <strong>respect lawful managerial authority</strong>. Unilateral action or immediate external escalation would be inappropriate unless illegal activity was involved.`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`An organization implements a control that automatically logs all failed authentication attempts and generates an alert after five consecutive failures. Which security control classification applies?`,
    opts:["Preventive-Technical","Detective-Technical","Corrective-Administrative","Deterrent-Physical"],
    answer:1,
    exp:`Logging failures and generating alerts <strong>detects</strong> a potential brute-force attack after it is occurring — it does not prevent the attempts. The mechanism is implemented through technology (software/log system), making it <strong>Detective-Technical</strong>. A preventive control would block the attempts before they occur (e.g., account lockout).`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`A user signs a document with their private key. The recipient verifies it with the sender's public key and the signature validates. Later, the sender claims they never signed the document. Which property of cryptography DIRECTLY refutes this claim?`,
    opts:["Confidentiality","Integrity","Availability","Non-repudiation"],
    answer:3,
    exp:`<strong>Non-repudiation</strong> prevents a party from denying an action they performed. Since only the sender possesses their private key, a valid signature created by that key is cryptographic proof of their involvement. They cannot credibly repudiate the signature.`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`A regulation requires that customer PII be protected from unauthorized disclosure. The security team implements full-disk encryption, strict ACLs, and DLP tools. An insider threat actor with legitimate access exfiltrates data through an approved business email account. Which element of the CIA triad was BREACHED, and which control type FAILED?`,
    opts:["Integrity; Corrective control failed","Confidentiality; Detective/Preventive controls were insufficient","Availability; Administrative controls failed","Non-repudiation; Technical controls failed"],
    answer:1,
    exp:`The breach is a <strong>Confidentiality</strong> violation — PII was disclosed to an unauthorized party. The controls (encryption, ACLs) focused on perimeter/technical access, failing to detect or prevent data exfiltration through a trusted channel. Both <strong>detective</strong> (behavioral analytics) and <strong>preventive</strong> (content inspection on outbound email) controls were insufficient.`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`An organization outsources its data processing to a cloud vendor. A breach at the vendor exposes customer records. The organization's privacy officer claims the vendor is solely responsible. Which risk management concept is MOST relevant to assessing this claim?`,
    opts:["Risk transference eliminates the organization's liability entirely","Risk acceptance was applied by outsourcing","Organizations can transfer operational risk but not regulatory/legal accountability","The vendor's SLA determines all liability by law"],
    answer:2,
    exp:`<strong>Risk transference</strong> (e.g., via contract or insurance) shifts financial impact but does NOT eliminate the original organization's regulatory and legal accountability to its customers. Data controllers remain responsible for processor compliance under frameworks like GDPR. The organization cannot fully absolve itself by pointing to the vendor.`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`During a tabletop exercise, a participant asks: "What's the difference between a policy and a standard?" Which answer is MOST accurate?`,
    opts:["A policy is technical; a standard is managerial","A policy states high-level requirements; a standard specifies mandatory measures that implement the policy","A standard is aspirational; a policy is enforceable only through standards","They are interchangeable terms in most governance frameworks"],
    answer:1,
    exp:`A <strong>policy</strong> is a high-level statement of management intent and direction (the "what" and "why"). A <strong>standard</strong> specifies mandatory, specific requirements that must be met to comply with the policy (the "how much" and "exactly what"). Procedures describe step-by-step implementation. Guidelines are optional recommendations.`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`Which authentication method provides the STRONGEST defense against real-time phishing attacks that relay OTP codes to the actual site?`,
    opts:["SMS-based OTP","TOTP authenticator apps","FIDO2 / WebAuthn hardware security keys","Push notification MFA"],
    answer:2,
    exp:`<strong>FIDO2/WebAuthn</strong> uses cryptographic challenge-response bound to the <em>origin</em> (domain). Even if a user is phished to a fake site, the hardware key refuses to authenticate because the origin doesn't match — defeating real-time phishing relays. TOTP codes, SMS OTPs, and push notifications can all be proxied by an attacker in real-time.`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`An organization uses a qualitative risk assessment methodology. A risk is rated "High" likelihood and "High" impact. After applying a control, it is re-rated "Low" likelihood and "High" impact. What term describes the risk level AFTER applying controls?`,
    opts:["Inherent risk","Residual risk","Control risk","Secondary risk"],
    answer:1,
    exp:`<strong>Residual risk</strong> is the risk remaining after controls are applied. <strong>Inherent risk</strong> is the risk before any controls. The reduction in likelihood (High → Low) with unchanged impact represents the residual risk the organization now accepts or must further treat.`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`A government agency classifies information as "SECRET." An employee downgrades the classification to "UNCLASSIFIED" without authorization to make sharing easier. Which governance element was VIOLATED?`,
    opts:["A procedure","A standard","A policy","A regulation"],
    answer:3,
    exp:`Government classification systems are governed by <strong>regulations</strong> (e.g., Executive Orders in the US). Unauthorized declassification violates both the regulatory framework and organizational policy. This is distinct from internal procedures (step-by-step tasks) or standards (specific technical measures).`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`Two security analysts debate: Analyst A says "privacy is a subset of confidentiality." Analyst B says "they are related but distinct concepts." Who is correct, and why?`,
    opts:["Analyst A — privacy is achieved solely through confidentiality controls","Analyst B — confidentiality protects information from unauthorized disclosure; privacy additionally governs the right to control one's own personal information and its use","Both are wrong — privacy and confidentiality are unrelated","Analyst A — ISC2 treats them as synonymous in the CC exam objectives"],
    answer:1,
    exp:`<strong>Analyst B is correct</strong>. Confidentiality prevents unauthorized disclosure (a technical security property). Privacy is a broader legal and ethical right — it concerns an individual's control over their own personal information, including how it is collected, used, shared, and retained. You can have confidentiality without respecting privacy (e.g., data shared only within a company but used beyond the person's consent).`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`Which of the following BEST illustrates "defense in depth" applied to a physical access scenario?`,
    opts:["A reinforced steel door with a biometric scanner","Perimeter fencing → guard checkpoint → mantrap → biometric entry → CCTV → motion sensors","An alarm system that triggers if the door is forced open","A 24/7 security guard at the main entrance"],
    answer:1,
    exp:`<strong>Defense in depth</strong> requires multiple, independent layers of control so that failure of one layer does not result in total compromise. Option B demonstrates layered physical controls: perimeter barrier → human verification → anti-tailgating mantrap → biometric authentication → monitoring → detection — each layer providing independent assurance.`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`A company's employees are required to complete annual security awareness training. This is BEST classified as which type of control?`,
    opts:["Technical-Preventive","Administrative-Preventive","Physical-Detective","Administrative-Detective"],
    answer:1,
    exp:`Security awareness training is an <strong>administrative</strong> control (a policy/process-based control) and is <strong>preventive</strong> in nature — it aims to reduce the likelihood of human errors and social engineering attacks before they occur. It does not detect incidents, nor is it physical or technical in implementation.`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`Under ISC2's CC curriculum, which of the following is an example of a "technical control"?`,
    opts:["A background check policy for new employees","A fire suppression system in the server room","An intrusion detection system monitoring network traffic","Annual risk reviews by the CISO"],
    answer:2,
    exp:`An <strong>Intrusion Detection System (IDS)</strong> is a technical control — it is implemented through technology to identify security events. Background checks are administrative controls. Fire suppression is a physical control. Annual risk reviews are administrative controls.`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`A threat actor exploits a zero-day vulnerability before any patch is available. From a risk management perspective, which statement is MOST accurate?`,
    opts:["The risk could not have been managed because the vulnerability was unknown","Compensating controls could still have reduced impact or likelihood","Risk acceptance was the only option available","This demonstrates that vulnerability management is ineffective"],
    answer:1,
    exp:`Even without a patch, <strong>compensating controls</strong> such as network segmentation, application whitelisting, behavioral monitoring, least privilege, and data-at-rest encryption can significantly reduce the likelihood and impact of a zero-day exploit. Risk management does not require knowing every specific threat — layered controls provide resilience against unknown threats.`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`An organization's data classification policy defines four levels: Public, Internal, Confidential, Restricted. A document contains both Internal and Confidential data. What classification should the ENTIRE document receive?`,
    opts:["Internal, because most of the content is Internal","Confidential, because the most sensitive data determines the classification","The document must be split into two separate documents","Public, because it will be shared externally"],
    answer:1,
    exp:`When a document contains data at multiple classification levels, the entire document must be classified at the <strong>highest level</strong> present. A single Confidential data element elevates the whole document to Confidential, as controls must protect the most sensitive content within it.`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`Which concept ensures that a system continues to function correctly even after a component fails, without exposing sensitive data?`,
    opts:["Fail-secure (fail-closed)","Fail-open","High availability","Fault tolerance"],
    answer:0,
    exp:`<strong>Fail-secure (fail-closed)</strong> means the system defaults to a secure state upon failure — e.g., a door locks rather than opening if the electronic lock loses power. Fail-open defaults to permissive access upon failure, which prioritizes availability over security. Fault tolerance and high availability focus on continued operation, not security state on failure.`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`A security analyst performs a Business Impact Analysis (BIA) and identifies that the payroll system has an RTO of 4 hours and an RPO of 1 hour. What do these values mean in practice?`,
    opts:["The system must be restored within 4 hours; backups must occur at most every 1 hour","The system can be down for 4 hours total per year; data loss up to 1 hour is acceptable per week","Recovery starts within 4 hours; the most recent backup must be from within 1 hour","The payroll system processes transactions every 4 hours with 1-hour reconciliation windows"],
    answer:0,
    exp:`<strong>RTO (Recovery Time Objective)</strong> is the maximum acceptable time to restore a system after an outage — here, 4 hours. <strong>RPO (Recovery Point Objective)</strong> is the maximum acceptable data loss measured in time — here, 1 hour, meaning backups (or replication) must occur at least every hour so no more than 1 hour of transactions can be lost.`
  },
  {
    domain:"D1", domainLabel:"Security Principles",
    q:`An employee receives an email appearing to be from the CEO requesting an urgent wire transfer. No callback verification is performed and the transfer is completed. Which attack type BEST describes this?`,
    opts:["Pretexting","Whaling / Business Email Compromise (BEC)","Spear phishing with malware delivery","Vishing"],
    answer:1,
    exp:`This is a classic <strong>Business Email Compromise (BEC)</strong> attack, specifically a type of <strong>whaling</strong> (targeting executives or their authority). Pretexting is the fabrication of a scenario (present here, but BEC is the more specific and accurate term). Spear phishing typically delivers malware. Vishing uses voice calls.`
  },
  {
    domain:"D1", domainLabel:"Security Principles",

    opts:["Process injection","DLL side-loading / DLL hijacking","Binary planting","Reflective DLL injection"],
    answer:1,
    exp:`<strong>DLL hijacking (side-loading)</strong> exploits Windows DLL search order — applications search the current directory before system directories. Placing a malicious DLL with the same name as a legitimate DLL in the application's directory causes the application to load and execute the malicious code with the application's privileges. This is a common persistence and privilege escalation technique in Windows environments.`
  },
  {
    domain:"D5", domainLabel:"Security Operations",
    q:`A security team implements a SOAR platform. Which capability is the PRIMARY differentiator between a SOAR and a traditional SIEM?`,
    opts:["SOAR stores more log data than SIEM","SOAR can automatically execute response actions (containment, remediation) based on playbooks, while SIEM primarily correlates and alerts","SOAR provides better threat intelligence feeds than SIEM","SOAR monitors endpoint activity while SIEM monitors network traffic"],
    answer:1,
    exp:`A <strong>SOAR (Security Orchestration, Automation and Response)</strong> platform adds automated response workflows (playbooks) that can take actions like: isolating endpoints, blocking IPs at the firewall, disabling compromised accounts, enriching alerts with threat intelligence — all automatically upon alert triggering. A SIEM correlates logs and generates alerts but requires <em>human action</em> for response. SOAR reduces mean time to respond (MTTR).`
  },
  {
    domain:"D5", domainLabel:"Security Operations",
    q:`A system administrator notices a Linux server has an unusual entry in /etc/cron.d/ that runs a script every 5 minutes from /tmp. What attacker technique does this MOST likely represent?`,
    opts:["Defense evasion via log deletion","Persistence via cron-based scheduled task","Privilege escalation via cron SUID abuse","Discovery via automated enumeration script"],
    answer:1,
    exp:`Creating a cron job that runs at regular intervals is a classic <strong>persistence mechanism</strong> (MITRE ATT&CK T1053 - Scheduled Task/Job). The script in /tmp (a world-writable directory typically not monitored as closely as /usr or /opt) adds obfuscation. This ensures the attacker's code runs even after reboot or if the initial access method is remediated. Monitoring /etc/cron.d/, /var/spool/cron/, and /etc/crontab for unauthorized entries is a key detection control.`
  },
  {
    domain:"D5", domainLabel:"Security Operations",
    q:`An organization's security policy requires that all privileged access be logged to an immutable, centralized log repository. An administrator deletes security logs directly from a compromised server. What control prevents this from being an effective cover-up?`,
    opts:["Antivirus on the server detects log deletion","Centralized, write-once SIEM with tamper-evident logging where logs are shipped in real-time","File integrity monitoring on local log files","Requiring dual authorization for log access"],
    answer:1,
    exp:`A <strong>centralized SIEM with real-time log forwarding to immutable/write-once storage</strong> ensures that even if an attacker deletes local logs, the events have already been forwarded and stored in a tamper-resistant location. The attacker can't retroactively delete what was already shipped. Syslog over TLS to a hardened log server or cloud-based SIEM is the standard implementation. Local FIM can detect deletion but can't prevent it or preserve the deleted content.`
  },
  {
    domain:"D5", domainLabel:"Security Operations",
    q:`An internal red team discovers they can access any employee's workstation by exploiting default credentials on the organization's remote management software (IPMI/iDRAC). What vulnerability class does this represent, and which CIS Control addresses it?`,
    opts:["Missing patches; CIS Control 7 (Continuous Vulnerability Management)","Default/unchanged credentials on hardware/software; CIS Control 4 (Secure Configuration) / CIS Control 5 (Account Management)","Weak encryption; CIS Control 10 (Data Recovery)","Missing MFA; CIS Control 6 (Access Control Management)"],
    answer:1,
    exp:`<strong>Default credentials</strong> that are never changed represent a <strong>secure configuration failure</strong> — a well-known and easily exploitable vulnerability. CIS Control 4 (Secure Configuration of Enterprise Assets) specifically addresses configuring systems securely including changing default credentials. CIS Control 5 (Account Management) covers managing accounts and credentials. Default credentials on IPMI/iDRAC (out-of-band management) are particularly dangerous as they provide hardware-level access.`
  }
];

let score = 0, wrong = 0, answered = 0;
const total = QUESTIONS.length;
let currentFilter = 'all';

function buildQuestions(){
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const visible = currentFilter === 'all' || q.domain === currentFilter;
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'q-card-' + i;
    card.style.display = visible ? '' : 'none';

    const optsHTML = q.opts.map((opt, j) => {
      const letters = ['A','B','C','D'];
      return `<div class="option" id="opt-${i}-${j}" onclick="selectAnswer(${i},${j})">
        <span class="opt-letter">${letters[j]}</span>
        <span class="opt-text">${opt}</span>
      </div>`;
    }).join('');

    const domainColors = {D1:'#ff9f43',D2:'#ee5a24',D3:'#00d2d3',D4:'#54a0ff',D5:'#5f27cd'};

    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">#${String(i+1).padStart(2,'0')}</span>
        <span class="q-domain" style="border-color:${domainColors[q.domain]}40;color:${domainColors[q.domain]}">${q.domainLabel}</span>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="options">${optsHTML}</div>
      <div class="explanation" id="exp-${i}">
        <strong>✓ Explanation:</strong> ${q.exp}
      </div>`;
    container.appendChild(card);
  });
}

function selectAnswer(qIdx, optIdx){
  const q = QUESTIONS[qIdx];
  const opts = document.querySelectorAll(`[id^="opt-${qIdx}-"]`);
  if(opts[0].classList.contains('locked')) return;

  opts.forEach(o => o.classList.add('locked'));
  const isCorrect = optIdx === q.answer;

  opts[q.answer].classList.add('correct');
  if(!isCorrect){
    opts[optIdx].classList.add('wrong');
    wrong++;
    document.getElementById('wrong-display').textContent = wrong;
  } else {
    score++;
    document.getElementById('score-display').textContent = score;
  }
  answered++;
  document.getElementById('remain-display').textContent = total - answered;
  const pct = Math.round((score / answered) * 100);
  document.getElementById('pct-display').textContent = pct + '%';

  document.getElementById('exp-' + qIdx).classList.add('show');
  document.getElementById('q-card-' + qIdx).classList.add('answered');

  if(answered === total){
    setTimeout(showResults, 600);
  }
}

function showResults(){
  const pct = Math.round((score / total) * 100);
  let grade, color;
  if(pct >= 90){ grade = '💀 ELITE — You belong in the SOC'; color = '#39ff14'; }
  else if(pct >= 80){ grade = '⚡ STRONG PASS — Well above 700/1000 threshold'; color = '#00d4ff'; }
  else if(pct >= 70){ grade = '⚠️ BORDERLINE — Review weak domains before exam'; color = '#ffd700'; }
  else { grade = '🔥 FAIL — More study needed, especially edge cases'; color = '#ff3e6c'; }

  document.getElementById('modal-score-text').textContent = `${score} / ${total}`;
  document.getElementById('modal-score-text').style.color = color;
  document.getElementById('modal-grade-text').textContent = grade;
  document.getElementById('modal-bar').style.width = pct + '%';
  document.getElementById('results-modal').classList.add('show');
}

function filterDomain(domain, btn){
  currentFilter = domain;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  QUESTIONS.forEach((q, i) => {
    const card = document.getElementById('q-card-' + i);
    card.style.display = (domain === 'all' || q.domain === domain) ? '' : 'none';
  });
}

function resetAll(){
  if(!confirm('Reset all answers? This cannot be undone.')) return;
  score = 0; wrong = 0; answered = 0;
  document.getElementById('score-display').textContent = '0';
  document.getElementById('wrong-display').textContent = '0';
  document.getElementById('remain-display').textContent = total;
  document.getElementById('pct-display').textContent = '—';
  buildQuestions();
}

buildQuestions();
</script>
